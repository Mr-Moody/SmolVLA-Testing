<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labeler</title>
  <link rel="stylesheet" href="/static/css/labeler.css">
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <span>loading</span>
</div>

<div id="app">

  <header id="header">
    <span class="hd-brand">Labeler</span>
    <div class="hd-sep"></div>
    <select id="dataset-select"></select>
    <span id="progress-badge">0 / 0</span>
    <div class="hd-sep"></div>
    <div class="hd-nav">
      <button id="btn-prev" disabled>&#8249;</button>
      <span id="ep-info">— / —</span>
      <button id="btn-next" disabled>&#8250;</button>
    </div>
    <div class="hd-spacer"></div>
    <div class="hd-jump">
      <input id="jump-input" type="number" min="1" step="1" placeholder="—">
      <button id="btn-go">go</button>
    </div>
  </header>

  <main id="video-grid"></main>

  <div id="transport">
    <div id="ctrl-row">
      <button id="btn-jump-start" title="Jump to trim start">&#9664;&#124;</button>
      <button id="btn-skip-back">&#8249; 5s</button>
      <button id="btn-playpause"><span class="btn-icon">&#9654;</span>&nbsp;Play</button>
      <button id="btn-skip-fwd">5s &#8250;</button>
      <button id="btn-jump-end" title="Jump to trim end">&#124;&#9654;</button>
      <div class="ctrl-flex"></div>
      <span id="time-display">0:00 / 0:00</span>
    </div>
    <div class="seekbar-row">
      <span class="timeline-label-spacer"></span>
      <input id="seekbar" type="range" min="0" max="1000" value="0" step="1">
      <span class="timeline-side-spacer"></span>
    </div>
    <div id="trim-row">
      <span class="panel-label">Crop</span>
      <div id="trim-timeline-wrap">
        <div id="trim-timeline">
          <div id="trim-region"></div>
          <div id="trim-handle-start" class="trim-handle trim-handle-start"></div>
          <div id="trim-handle-end" class="trim-handle trim-handle-end"></div>
          <div id="trim-playhead"></div>
        </div>
      </div>
      <div class="timeline-side-controls">
        <span id="trim-display">—</span>
        <button id="btn-save-trim">Save</button>
      </div>
    </div>
  </div>

  <div id="annotation-area">
    <div class="anno-section">
      <div class="anno-header">
        <span class="panel-label">Task</span>
        <span id="ep-annotation-status" class="anno-status"></span>
      </div>
      <textarea id="task-input" placeholder="Describe the manipulation task (e.g. pick up the red cube and place it in the bin)" rows="2"></textarea>
    </div>
    <div class="anno-section" id="subtask-section">
      <div class="anno-header">
        <span class="panel-label">Subtasks</span>
        <span class="anno-hint">drag bar to scrub, handles to edit phases</span>
      </div>
      <div id="subtask-timeline-row">
        <span class="timeline-label-spacer"></span>
        <div id="subtask-timeline-wrap">
          <div id="subtask-timeline"></div>
          <div id="subtask-time-labels"></div>
        </div>
        <span class="timeline-side-spacer"></span>
      </div>
    </div>
    <div id="submit-row">
      <button id="btn-submit" class="btn-primary">Save annotation</button>
      <button id="btn-save-subtasks" disabled>Save subtasks</button>
      <button id="btn-delete" class="btn-danger">Delete episode</button>
      <span id="status-msg"></span>
    </div>
  </div>

</div>

<script src="/static/js/labeler.js"></script>
</body>
</html>
