name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.12-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: pip-${{ runner.os }}-py3.12-

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -v \
            -m "not gpu" \
            --deselect tests/test_smolvla_fork.py::test_policy_class_importable \
            --tb=short
