# Base training config — inherited by all three variant configs.
# Invocation:
#   python scripts/train_phase.py --config configs/training/<variant>.yaml --dataset-name <name>

optimizer: adamw
lr: 1.0e-4
lr_scheduler: cosine
batch_size: 8
steps: 20000
mixed_precision: bf16
log_freq: 50
save_freq: 1000
seed: 1000
num_workers: 4
device: cuda
